name: Build plugin

on:
  workflow_call:
    outputs:
      zip-artifact-name:
        description: Zip artifact name
        value: ${{ jobs.build.outputs.zip-artifact-name }}
      zip-file-name:
        description: Zip file name
        value: ${{ jobs.build.outputs.zip-file-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      zip-artifact-name: ${{ steps.zip-artifact-name.outputs.value }}
      zip-file-name: ${{ steps.zip-file-name.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.0.0

      - name: Compile CSS and Javascript
        run: |
          npm ci --ignore-scripts --legacy-peer-deps
          npm run build
          npm run build:blocks

      - name: Prepare deploy directory
        run: |
          mkdir -p .wporg-build
          cp -R mappps.php license.txt readme.txt lang includes build .wporg-build/

      - name: Build canonical plugin zip
        run: |
          cd .wporg-build
          zip -r "../mappps.zip" .

      - name: Set zip artifact name
        id: zip-artifact-name
        run: echo "value=plugin-zip" >> "$GITHUB_OUTPUT"

      - name: Set zip file name
        id: zip-file-name
        run: echo "value=mappps.zip" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: mappps.zip
          if-no-files-found: error
